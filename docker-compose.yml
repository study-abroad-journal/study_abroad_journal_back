services:
  frontend:
    build: ../study_abroad_journal_front
    ports:
      - "3000:3000"
    volumes:
      - ../study_abroad_journal_front:/app
    environment:
      # - NEXT_PUBLIC_API_URL=http://backend:8080
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - backend

  backend:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - .:/app/src
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_USER=user
      - DB_PASSWORD=pass
      - DB_NAME=sabj_db
      - DB_PORT=5432

  db:
    image: postgres:15
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=sabj_db
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d sabj_db"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  db-data:
