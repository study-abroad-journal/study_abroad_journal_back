<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>日記投稿テスト</title>
  </head>
  <body>
    <h1>日記投稿フォーム</h1>
    <form id="diaryForm">
      <label
        >タイトル: <input type="text" id="title" value="初めての日記" /></label
      ><br />
      <label
        >本文: <textarea id="text">今日はアプリを動かせた！</textarea></label
      ><br />
      <button type="submit">送信</button>
    </form>

    <h2>レスポンス(JSON)</h2>
    <pre id="response"></pre>

    <script>
      document
        .getElementById("diaryForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const title = document.getElementById("title").value;
          const text = document.getElementById("text").value;

          try {
            const res = await fetch("http://localhost:8080/api/diary", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                user_id: 1, // ← 追加
                title: title,
                text: text,
                latitude: 35.6895,
                longitude: 139.6917,
                category_id: 1,
              }),
            });

            const json = await res.json();
            document.getElementById("response").textContent = JSON.stringify(
              json,
              null,
              2
            );
          } catch (error) {
            document.getElementById("response").textContent =
              "エラー: " + error.message;
          }
        });
    </script>
  </body>
</html>
